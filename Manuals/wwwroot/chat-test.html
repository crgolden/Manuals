<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalR Chat Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; font-size: 0.875rem; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
    button { margin-top: 1rem; padding: 0.5rem 1.25rem; background: #0078d4; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status { margin-top: 0.5rem; font-size: 0.8rem; color: #555; }
    #output { margin-top: 1.5rem; border: 1px solid #ddd; border-radius: 4px; padding: 1rem; min-height: 120px; white-space: pre-wrap; background: #fafafa; font-size: 0.9rem; line-height: 1.5; }
    .typing { font-style: italic; color: #888; }
    .done { font-weight: 600; color: #107c10; }
    #clearBtn { background: #d13438; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <h2>Azure OpenAI · SignalR Streaming Test</h2>

  <label for="convId">Conversation ID</label>
  <input id="convId" type="text" />

  <label for="systemPrompt">System Prompt <span style="font-weight:400">(first turn only)</span></label>
  <textarea id="systemPrompt" rows="2" placeholder="You are a helpful assistant."></textarea>

  <label for="message">Message</label>
  <input id="message" type="text" placeholder="Ask something…" />

  <div>
    <button id="sendBtn" disabled>Send</button>
    <button id="clearBtn" disabled>Clear History</button>
  </div>

  <div id="status">Connecting…</div>
  <div id="output"></div>

  <script>
    // Pre-fill a UUID conversation ID
    document.getElementById('convId').value =
      ([1e7] + -1e3 + -4e3 + -8e3 + -1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));

    const connection = new signalR.HubConnectionBuilder()
      .withUrl('/hubs/chat')
      .withAutomaticReconnect()
      .build();

    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');

    let currentResponse = '';

    connection.on('ReceiveSignal', (signal) => {
      if (signal.type === 'typing') {
        output.innerHTML = '<span class="typing">Thinking…</span>';
        currentResponse = '';
      } else if (signal.type === 'partial') {
        currentResponse += signal.content;
        output.textContent = currentResponse;
      } else if (signal.type === 'completed') {
        output.textContent = currentResponse || signal.content;
        output.innerHTML += '\n\n<span class="done">✓ Done</span>';
        sendBtn.disabled = false;
      }
    });

    connection.onreconnecting(() => { status.textContent = 'Reconnecting…'; sendBtn.disabled = true; });
    connection.onreconnected(() => { status.textContent = 'Connected'; sendBtn.disabled = false; });
    connection.onclose(() => { status.textContent = 'Disconnected'; sendBtn.disabled = true; clearBtn.disabled = true; });

    connection.start().then(() => {
      status.textContent = 'Connected';
      sendBtn.disabled = false;
      clearBtn.disabled = false;
    }).catch(err => {
      status.textContent = 'Connection failed: ' + err;
    });

    sendBtn.addEventListener('click', () => {
      const msg = document.getElementById('message').value.trim();
      if (!msg) return;
      sendBtn.disabled = true;
      output.innerHTML = '';

      const request = {
        conversationId: document.getElementById('convId').value,
        message: msg,
        systemPrompt: document.getElementById('systemPrompt').value.trim() || null
      };

      connection.invoke('SendMessage', request).catch(err => {
        output.textContent = 'Error: ' + err;
        sendBtn.disabled = false;
      });
    });

    clearBtn.addEventListener('click', async () => {
      const convId = document.getElementById('convId').value;
      const res = await fetch('/api/chat/' + encodeURIComponent(convId), { method: 'DELETE' });
      if (res.ok) {
        output.textContent = '(Conversation history cleared)';
        document.getElementById('systemPrompt').value = '';
      }
    });

    document.getElementById('message').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendBtn.click();
    });
  </script>
</body>
</html>
